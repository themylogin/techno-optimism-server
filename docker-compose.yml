services:
  server:
    build: .
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "127.0.0.1:${HOST_PORT:-8080}:8080"
    volumes:
      - ./interactions:/app/interactions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
